name: ShieldRide Quality Gates

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: shieldride-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Build and Quality Suite
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      CI: true
      MONGODB_MODE: local
      MONGODB_LOCAL_URI: mongodb://127.0.0.1:27017/shieldride_ci
      MONGODB_FALLBACK_MODE: off
      JWT_SECRET: ci-secret
      API_JSON_LIMIT: 10mb
      API_URLENCODED_LIMIT: 10mb
      INSURER_EMAIL: insurer@shieldride.ai
      INSURER_PASSWORD: Insurer@123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run quality suite
        run: npm run test:quality

  smoke:
    name: API and UI Smoke
    runs-on: ubuntu-latest
    needs: quality
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      CI: true
      MONGODB_MODE: local
      MONGODB_LOCAL_URI: mongodb://127.0.0.1:27017/shieldride_ci
      MONGODB_FALLBACK_MODE: off
      JWT_SECRET: ci-secret
      API_JSON_LIMIT: 10mb
      API_URLENCODED_LIMIT: 10mb
      INSURER_EMAIL: insurer@shieldride.ai
      INSURER_PASSWORD: Insurer@123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: |
          npm run start:server > /tmp/shieldride-api.log 2>&1 &
          echo $! > /tmp/shieldride-api.pid

      - name: Wait for API health
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:4000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy in time"
          cat /tmp/shieldride-api.log || true
          exit 1

      - name: Run API smoke
        run: npm run test:smoke:api

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/shieldride-api.pid ]; then
            kill "$(cat /tmp/shieldride-api.pid)" || true
          fi

      - name: Run UI smoke
        run: npm run test:smoke:ui

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report

      - name: Upload API server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shieldride-api-log
          path: /tmp/shieldride-api.log
